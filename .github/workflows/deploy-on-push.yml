# Auto-deploy to Firebase on every push to main.
#
# One-time setup required (already done):
#   1. On your local Mac: firebase login:ci
#   2. GitHub repo → Settings → Secrets and variables → Actions
#   3. Add secret named FIREBASE_TOKEN with the token from step 1
#
# Safety:
#   - Only triggers on push to main + manual dispatch. No pull_request trigger.
#   - `concurrency:` cancels stale runs when a newer push lands.
#   - The deploy step has an explicit `if:` guard as belt-and-suspenders.
#   - Pre-flight verifies FIREBASE_TOKEN is set so we fail fast.

name: Deploy to Firebase
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify FIREBASE_TOKEN is set
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN secret is missing or empty."
            echo "Fix: run 'firebase login:ci' locally, then update the secret at"
            echo "  Settings → Secrets and variables → Actions → FIREBASE_TOKEN"
            exit 1
          fi
          echo "FIREBASE_TOKEN present (length: ${#FIREBASE_TOKEN})"

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci --no-audit --no-fund

      - name: Build functions (tsc)
        working-directory: functions
        run: npm run build

      - name: Build hosting bundle (vite)
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy
        run: firebase deploy --only hosting,functions,firestore:rules --project skyelineos --force --non-interactive --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
